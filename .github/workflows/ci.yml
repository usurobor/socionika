name: CI

on:
  push:
    branches:
      - "**"
  pull_request:

jobs:
  tests-no-cadquery:
    name: Tests (no CadQuery)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - name: Verify cadquery is absent
        run: |
          python -c "import importlib.util; assert importlib.util.find_spec('cadquery') is None, 'cadquery must not be installed in this job'"
      - name: Run unit tests
        working-directory: design/logo
        run: |
          python -m unittest discover -v tests

  tests-with-cadquery:
    name: Tests (with CadQuery)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - name: Install CadQuery
        working-directory: design/logo
        run: |
          pip install --upgrade pip
          pip install -r requirements-cadquery.txt
      - name: Run unit tests
        working-directory: design/logo
        run: |
          python -m unittest discover -v tests

  export-artifacts:
    name: Export STEP/STL artifacts
    needs: tests-with-cadquery
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install CadQuery
        working-directory: design/logo
        run: |
          pip install --upgrade pip
          pip install -r requirements-cadquery.txt
      - name: Export medallion STEP + STL
        working-directory: design/logo
        run: |
          mkdir -p out
          python -m socionics_medallion.cli compile \
            --plan canonical --executor cadquery \
            --step out/medallion.step --stl out/medallion.stl
          test -s out/medallion.step
          test -s out/medallion.stl
      - name: Upload medallion artifacts
        uses: actions/upload-artifact@v4
        with:
          name: medallion-cad
          path: |
            design/logo/out/medallion.step
            design/logo/out/medallion.stl
          if-no-files-found: error
